<!DOCTYPE html>
<html>

<head>

<title>NIDS Cyber Security Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* Header */

.header{
background:#111827;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
border-bottom:2px solid #22c55e;
}

/* Container */

.container{
width:90%;
margin:auto;
margin-top:30px;
}

/* Alert */

.alert{
background:#dc2626;
padding:10px;
border-radius:6px;
text-align:center;
margin-bottom:30px;
}

/* Cards */

.cards{
display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
width:250px;
text-align:center;
box-shadow:0px 0px 10px black;
}

.card h2{
margin:10px 0;
}

/* Button */

button{
background:#22c55e;
border:none;
padding:10px 20px;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* Graph section */

.chart-box{
margin-top:50px;
background:#1e293b;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px black;
}

</style>

</head>

<body>

<div class="header">
Network Intrusion Detection System Dashboard
</div>

<div class="container">

<div class="alert">
⚠ Intrusion Detection System Active
</div>

<div class="cards">

<div class="card">
<h3>Total Intrusions</h3>
<h2>{{ total }}</h2>
</div>

<div class="card">
<h3>Logs</h3>

<a href="/logs">
<button>View Intrusion Logs</button>
</a>

</div>

</div>


<div class="chart-box">

<h2 style="text-align:center;">Attack Statistics</h2>

<canvas id="attackChart"></canvas>

</div>

</div>

<script>

const labels = {{ labels|tojson }};
const values = {{ values|tojson }};

new Chart(document.getElementById("attackChart"), {

type: "bar",

data: {

labels: labels,

datasets: [{

label: "Detected Attacks",

data: values,

backgroundColor: [
"#ef4444",
"#f97316",
"#eab308",
"#22c55e"
]

}]

},

options: {

responsive:true,

plugins:{
legend:{
labels:{color:"white"}
}
},

scales:{

x:{
ticks:{color:"white"}
},

y:{
ticks:{color:"white"}
}

}

}

});

</script>

</body>
</html>
